<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Integrasi Sheets & GitHub</title>
</head>
<body>
  <h2>Data Pengguna dari Google Sheets</h2>
  <ul id="data-list">Loading data...</ul>

  <script>
    // Ganti dengan URL Aplikasi Web dari Google Apps Script Anda
    const scriptUrl = 'function doGet() {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var data = sheet.getDataRange().getValues();
  
  // Mengubah data baris dan kolom menjadi format JSON (Array of Objects)
  var result = [];
  var headers = data[0];
  
  for (var i = 1; i < data.length; i++) {
    var row = {};
    for (var j = 0; j < headers.length; j++) {
      row[headers[j]] = data[i][j];
    }
    result.push(row);
  }
  
  // Mengembalikan data dalam format JSON
  return ContentService.createTextOutput(JSON.stringify(result))
    .setMimeType(ContentService.MimeType.JSON);
}';

    fetch(scriptUrl)
      .then(response => response.json())
      .then(data => {
        const list = document.getElementById('data-list');
        list.innerHTML = ''; // Hapus teks loading
        
        // Looping data dan masukkan ke dalam list HTML
        data.forEach(item => {
          let li = document.createElement('li');
          // 'Nama' dan 'Email' harus sama persis dengan header di Sheets Anda (huruf besar/kecilnya)
          li.textContent = `${item.Nama} - ${item.Email}`; 
          list.appendChild(li);
        });
      })
      .catch(error => {
        console.error('Error:', error);
        document.getElementById('data-list').innerHTML = 'Gagal memuat data.';
      });
  </script>
</body>
</html>
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kirim Data ke Sheets</title>
</head>
<body>
  <h2>Formulir Input Data</h2>
  
  <!-- Membuat Form Input -->
  <form id="myForm">
    <!-- Atribut name="Nama" ini akan ditangkap oleh e.parameter.Nama di Apps Script -->
    <input type="text" name="Nama" placeholder="Nama Lengkap" required><br><br>
    
    <!-- Atribut name="Email" ini akan ditangkap oleh e.parameter.Email di Apps Script -->
    <input type="email" name="Email" placeholder="Alamat Email" required><br><br>
    
    <button type="submit" id="btn-submit">Simpan ke Sheets</button>
  </form>

  <!-- Tempat untuk menampilkan status pengiriman (loading/sukses/gagal) -->
  <p id="status-pesan"></p>

  <script>
    // Masukkan URL Apps Script Anda di sini
    const scriptUrl = 'URL_APPS_SCRIPT_ANDA';
    const form = document.getElementById('myForm');
    const pesan = document.getElementById('status-pesan');
    const tombol = document.getElementById('btn-submit');

    // Menangkap momen ketika tombol Submit diklik
    form.addEventListener('submit', e => {
      e.preventDefault(); // Mencegah halaman web refresh secara otomatis

      // Mengubah teks saat proses pengiriman berlangsung
      pesan.textContent = "Sedang menyimpan data, mohon tunggu...";
      tombol.disabled = true; // Mematikan tombol sementara agar tidak diklik 2 kali

      // Mengambil seluruh isian form secara otomatis
      const formData = new FormData(form);

      // Mengirim data menggunakan fungsi fetch dengan metode POST
      fetch(scriptUrl, { 
        method: 'POST', 
        body: formData 
      })
      .then(response => response.text())
      .then(hasil => {
        // Jika sukses
        pesan.textContent = "Berhasil! Data telah masuk ke Google Sheets.";
        form.reset(); // Mengosongkan form kembali
        tombol.disabled = false; // Menyalakan tombol kembali
      })
      .catch(error => {
        // Jika gagal
        pesan.textContent = "Gagal mengirim data. Silakan coba lagi.";
        console.error('Error!', error.message);
        tombol.disabled = false;
      });
    });
  </script>
</body>
</html>
